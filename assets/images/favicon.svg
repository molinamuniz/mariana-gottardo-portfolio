<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Mariana Gottardo Arquitetura</title>
  <desc id="desc">Icone com monograma MG sobre fundo creme.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5eee3"/>
      <stop offset="100%" stop-color="#e8dbc8"/>
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap');

    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      letter-spacing: -0.03em;
    }
  </style>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#7a6248" stroke-opacity="0.38" stroke-width="1.4"/>

  <text
    class="monogram"
    x="32"
    y="40"
    text-anchor="middle"
    font-size="31"
    fill="#1c1510"
  >MG</text>
</svg>
